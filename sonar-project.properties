# SonarQube server settings
sonar.host.url=http://localhost:9000
sonar.token=squ_d1df1f648eca3cc9b8fd2bbaf47557be478d2118

# Project identification
sonar.projectKey=econ
sonar.projectName=econ
sonar.projectVersion=1.0

# Analysis settings
sonar.sources=.
sonar.tests=.

# Analyze only JS/JSX files in this repo.
sonar.inclusions=\
	**/*.js,\
	**/*.jsx

# Test files recognized from Jest + Playwright configs.
sonar.test.inclusions=\
	**/*.test.js,\
	**/*.test.jsx,\
	**/*.integration.test.js,\
	**/*.spec.js

# Exclude generated artifacts and dependencies from analysis.
sonar.exclusions=\
	**/node_modules/**,\
	**/coverage/**,\
	**/playwright-report/**,\
	**/test-results/**,\
	client/src/_site/**

# Coverage is imported from Jest LCOV output.
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclude tests and runtime/bootstrap files from coverage denominator.
# Playwright E2E contributes test execution, not JS line coverage in this setup.
sonar.coverage.exclusions=\
	**/*.test.js,\
	**/*.test.jsx,\
	**/*.integration.test.js,\
	**/*.spec.js,\
	client/src/index.js,\
	client/src/reportWebVitals.js,\
	client/src/setupTests.js,\
	client/src/_site/**
