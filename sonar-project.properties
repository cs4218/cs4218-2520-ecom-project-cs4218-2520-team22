# SonarQube server settings
sonar.host.url=http://localhost:9000
sonar.token=squ_d1df1f648eca3cc9b8fd2bbaf47557be478d2118

# Project identification
sonar.projectKey=econ
sonar.projectName=econ
sonar.projectVersion=1.0

# Analysis settings
sonar.sources=.
sonar.tests=.

# Analyze only JS/JSX files in this repo.
sonar.inclusions=\
	**/*.js,\
	**/*.jsx

# Test files recognized from Jest + Playwright configs.
sonar.test.inclusions=\
	**/*.test.js,\
	**/*.test.jsx,\
	**/*.integration.test.js,\
	**/*.spec.js

sonar.exclusions=\
	**/node_modules/**,\
	**/coverage/**,\
	**/playwright-report/**,\
	**/test-results/**,\
	client/src/_site/**

sonar.coverage.exclusions=\
	**/*.test.js,\
	**/*.test.jsx,\
	**/*.integration.test.js,\
	**/*.spec.js,\
	client/src/index.js,\
	client/src/reportWebVitals.js,\
	client/src/setupTests.js,\
	client/src/_site/**
