name: Health Check

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  health-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Run health check tests
        run: npm run test:health
