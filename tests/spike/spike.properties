# ============================================================
# JMeter Spike Test Properties - JTL Save Service
# ============================================================
jmeter.save.saveservice.response_code=true
jmeter.save.saveservice.latency=true
jmeter.save.saveservice.timestamp_format=ms
jmeter.save.saveservice.thread_counts=true
jmeter.save.saveservice.label=true
jmeter.save.saveservice.response_message=true
jmeter.save.saveservice.encoding=true
jmeter.save.saveservice.success=true
jmeter.save.saveservice.bytes=true
jmeter.save.saveservice.hostname=true
jmeter.save.saveservice.connect_time=true

resultcollector.action_if_file_exists=delete

# ============================================================
# Aggregate Report Percentiles
# ============================================================
aggregate_rpt_pct1=50
aggregate_rpt_pct2=95

# ============================================================
# JMeter HTML Report Generator Configuration
# ============================================================

# Report generator output directory and granularity
jmeter.reportgenerator.overall_granularity=5000
jmeter.reportgenerator.queue.size=5000
jmeter.reportgenerator.statistic.sample.count=10000
jmeter.reportgenerator.report.title=Spike Test Performance Report

# ============================================================
# Graph Generators - Response Time (Success & Failure)
# ============================================================
jmeter.reportgenerator.graph.response_time_percentiles_Over_Time.classname=org.apache.jmeter.visualizers.backend.graphite.GraphiteGraphComputer
jmeter.reportgenerator.graph.response_time_percentiles_Over_Time.expression=${SUCCESS:nodeLabel}
jmeter.reportgenerator.graph.response_time_percentiles_Over_Time.title=Response Time Percentiles Over Time
jmeter.reportgenerator.graph.response_time_percentiles_Over_Time.exclude_controllers.expression=

jmeter.reportgenerator.graph.response_time_distribution.classname=org.apache.jmeter.visualizers.backend.graphite.GraphiteGraphComputer
jmeter.reportgenerator.graph.response_time_distribution.expression=${Success:nodeLabel}
jmeter.reportgenerator.graph.response_time_distribution.title=Response Time Distribution
jmeter.reportgenerator.graph.response_time_distribution.exclude_controllers.expression=

# ============================================================
# Graph Generators - Active Threads
# ============================================================
jmeter.reportgenerator.graph.threads_state_Over_Time.classname=org.apache.jmeter.visualizers.backend.graphite.GraphiteGraphComputer
jmeter.reportgenerator.graph.threads_state_Over_Time.expression=${Threads:nodeLabel}
jmeter.reportgenerator.graph.threads_state_Over_Time.title=Active Threads Over Time
jmeter.reportgenerator.graph.threads_state_Over_Time.exclude_controllers.expression=

# ============================================================
# Graph Generators - Error Rate & Failures
# ============================================================
jmeter.reportgenerator.graph.errors_Per_Second.classname=org.apache.jmeter.visualizers.backend.graphite.GraphiteGraphComputer
jmeter.reportgenerator.graph.errors_Per_Second.expression=${Error:nodeLabel}
jmeter.reportgenerator.graph.errors_Per_Second.title=Error Rate Over Time
jmeter.reportgenerator.graph.errors_Per_Second.exclude_controllers.expression=

jmeter.reportgenerator.graph.response_time_vs_threads.classname=org.apache.jmeter.visualizers.backend.graphite.GraphiteGraphComputer
jmeter.reportgenerator.graph.response_time_vs_threads.expression=${ActiveThreads}
jmeter.reportgenerator.graph.response_time_vs_threads.title=Response Time vs Active Threads
jmeter.reportgenerator.graph.response_time_vs_threads.exclude_controllers.expression=

# ============================================================
# Latency Configuration
# ============================================================
jmeter.reportgenerator.graph.latency_Over_Time.classname=org.apache.jmeter.visualizers.backend.graphite.GraphiteGraphComputer
jmeter.reportgenerator.graph.latency_Over_Time.expression=${Latency:nodeLabel}
jmeter.reportgenerator.graph.latency_Over_Time.title=Latency Over Time
jmeter.reportgenerator.graph.latency_Over_Time.exclude_controllers.expression=

# ============================================================
# Filter Configuration
# ============================================================
# Include all samples (no filtering)
jmeter.reportgenerator.sample.filter.start_offset=0

# ============================================================
# Report Generator Excluded Controllers
# ============================================================
# Leave empty to include all controllers
jmeter.reportgenerator.exclude_controllers.expression=
